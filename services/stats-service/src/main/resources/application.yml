server:
  port: 8086

spring:
  application:
    name: stats-service

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/elh}
    username: ${POSTGRES_USERNAME:elh}
    password: ${POSTGRES_PASSWORD:elh}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: stats-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.elh.commons.events,com.elh.commons.events.*"

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:elh}
    password: ${RABBITMQ_PASSWORD:elh}
    template:
      retry:
        enabled: true
        max-attempts: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: stats-service
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://zipkin:9411}/api/v2/spans

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} [trace=%X{traceId}] [cid=%X{correlationId}] - %msg%n"
