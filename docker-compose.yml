# ──────────────────────────────────────────────────────────────────────
#  ELH — Every Losted History
#  Ambiente de desenvolvimento local
#
#  Como usar:
#    docker compose up -d            → sobe toda a infra
#    docker compose up -d kafka pg   → só o que você precisa agora
#    docker compose logs -f kafka    → acompanha um serviço
#    docker compose down -v          → derruba e limpa volumes
#
#  Portas expostas (para acessar do host):
#    Kafka:        localhost:9092
#    Kafka UI:     localhost:8090
#    RabbitMQ:     localhost:5672  |  UI: localhost:15672 (guest/guest)
#    PostgreSQL:   localhost:5432  (user: elh / pass: elh / db: elh)
#    Redis:        localhost:6379
#    Elasticsearch:localhost:9200
#    Grafana:      localhost:3000  (admin/admin)
#    Prometheus:   localhost:9090
#    Loki:         localhost:3100
# ──────────────────────────────────────────────────────────────────────

networks:
  elh-net:
    driver: bridge

volumes:
  pg-data:
  redis-data:
  es-data:
  kafka-data:
  grafana-data:
  prometheus-data:
  rabbitmq-data:
  loki-data:

services:
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: elh-kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - elh-net
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: elh-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: elh-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - elh-net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: elh-rabbitmq
    hostname: elh-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" 
    environment:
      RABBITMQ_DEFAULT_USER: elh
      RABBITMQ_DEFAULT_PASS: elh
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - elh-net
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      interval: 10s
      timeout: 10s
      retries: 10

  postgres:
    image: postgres:16-alpine
    container_name: elh-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: elh
      POSTGRES_PASSWORD: elh
      POSTGRES_DB: elh
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - elh-net
    healthcheck:
      test: pg_isready -U elh -d elh
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: elh-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - elh-net
    healthcheck:
      test: redis-cli ping
      interval: 5s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: elasticsearch:8.13.4
    container_name: elh-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - elh-net
    healthcheck:
      test: curl -s http://localhost:9200/_cluster/health | grep -q '"status":"green\|yellow"'
      interval: 15s
      timeout: 10s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: elh-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - elh-net

  grafana:
    image: grafana/grafana:10.4.3
    container_name: elh-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - elh-net

  loki:
    image: grafana/loki:2.9.8
    container_name: elh-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks:
      - elh-net

  promtail:
    image: grafana/promtail:2.9.8
    container_name: elh-promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki
    networks:
      - elh-net

  # Simula o AWS S3 localmente
  # Acesse: http://localhost:4566
  localstack:
    image: localstack/localstack:3.4
    container_name: elh-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    volumes:
      - ./infra/localstack/init-s3.sh:/etc/localstack/init/ready.d/init-s3.sh:ro
    networks:
      - elh-net
    healthcheck:
      test: awslocal s3 ls
      interval: 10s
      timeout: 10s
      retries: 10
